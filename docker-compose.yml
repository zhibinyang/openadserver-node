services:
  # ============================================
  # Ad Server (Node.js)
  # ============================================
  ad-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://oas:oas_password@postgres:5432/oas
      - BASE_URL=https://ads.zhibinyang.net
      - MODEL_CVR_PATH=/usr/src/app/models/pcvr_deepfm_model_latest.onnx
      - MODEL_CTR_PATH=/usr/src/app/models/pctr_deepfm_model_latest.onnx
      - FEATURE_CONFIG_PATH=/usr/src/app/models/feature_config_latest.json
      - GEO_DB_PATH=/usr/src/app/libs/geo/GeoLite2-City.mmdb
      - GOOGLE_CLOUD_PROJECT=node-quest-zbyang
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/credential.json
      - WRITE_TARGET=BOTH
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - GEMINI_EMBEDDING_MODEL=gemini-embedding-001
      - GEMINI_LLM_MODEL=gemini-3.1-flash-lite-preview
      # Kafka 配置
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--header=Content-Type: application/json", "--post-data={\"slot_id\":\"health_check_mock_id\"}", "-qO-", "http://localhost:3000/ad/get"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    volumes:
      - ~/.config:/root/.config:ro
    networks:
      - openadserver-network

  # ============================================
  # PostgreSQL Database (CDC Enabled)
  # ============================================
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: oas
      POSTGRES_PASSWORD: oas_password
      POSTGRES_DB: oas
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-cdc.sql:/docker-entrypoint-initdb.d/init-cdc.sql:ro
    ports:
      - "5432:5432"
    command: [
      "postgres",
      "-c", "wal_level=logical",
      "-c", "max_replication_slots=5",
      "-c", "max_wal_senders=5",
      "-c", "max_connections=100"
    ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oas -d oas"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - openadserver-network
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - openadserver-network
    deploy:
      resources:
        limits:
          memory: 128M

  # ============================================
  # Milvus Vector Database
  # ============================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - openadserver-network
    deploy:
      resources:
        limits:
          memory: 128M

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - openadserver-network
    deploy:
      resources:
        limits:
          memory: 128M

  milvus:
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - openadserver-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================
  # Kafka (KRaft mode, no ZooKeeper)
  # ============================================
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      # Single-node settings for replication factors (matches single broker)
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "openadserver-cluster-1"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - openadserver-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================
  # ClickHouse
  # ============================================
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: clickhouse
    ports:
      - "8123:8123"  # HTTP
      - "9000:9000"  # Native
    environment:
      - CLICKHOUSE_DB=default
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./src/modules/events/clickhouse/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - openadserver-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ============================================
  # Flink JobManager (custom image with connectors pre-installed)
  # ============================================
  flink-jobmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: flink-jobmanager
    ports:
      - "8081:8081"  # Web UI
      - "6123:6123"  # RPC
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        jobmanager.memory.process.size: 800m
        state.backend: rocksdb
        state.checkpoints.dir: file:///opt/flink/checkpoints
        state.savepoints.dir: file:///opt/flink/savepoints
        execution.checkpointing.interval: 60000
        execution.checkpointing.mode: EXACTLY_ONCE
    volumes:
      - flink_data:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
      - ./flink/protobuf:/opt/flink/protobuf
    restart: unless-stopped
    networks:
      - openadserver-network
    deploy:
      resources:
        limits:
          memory: 800M

  # ============================================
  # Flink TaskManager (custom image with connectors pre-installed)
  # ============================================
  flink-taskmanager:
    build:
      context: ./flink
      dockerfile: Dockerfile
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        jobmanager.rpc.port: 6123
        taskmanager.memory.process.size: 1g
        taskmanager.numberOfTaskSlots: 1
    volumes:
      - flink_data:/opt/flink/checkpoints
      - flink_savepoints:/opt/flink/savepoints
      - ./flink/protobuf:/opt/flink/protobuf
    restart: unless-stopped
    networks:
      - openadserver-network
    deploy:
      resources:
        limits:
          memory: 1G


volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
  kafka_data:
  clickhouse_data:
  flink_data:
  flink_savepoints:

networks:
  openadserver-network:
    driver: bridge
