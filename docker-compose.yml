services:
  # Ad Server (Node.js)
  ad-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgresql://oas:oas_password@postgres:5432/oas
      - BASE_URL=https://ads.zhibinyang.net
      - MODEL_CVR_PATH=/usr/src/app/models/pcvr_deepfm_model_latest.onnx
      - MODEL_CTR_PATH=/usr/src/app/models/pctr_deepfm_model_latest.onnx
      - FEATURE_CONFIG_PATH=/usr/src/app/models/feature_config_latest.json
      - GEO_DB_PATH=/usr/src/app/libs/geo/GeoLite2-City.mmdb
      - GOOGLE_CLOUD_PROJECT=node-quest-zbyang
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/credential.json
      - WRITE_TARGET=BOTH
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - GEMINI_EMBEDDING_MODEL=gemini-embedding-001
      - GEMINI_LLM_MODEL=gemini-3.1-flash-lite-preview
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--header=Content-Type: application/json", "--post-data={\"slot_id\":\"health_check_mock_id\"}", "-qO-", "http://localhost:3000/ad/get"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    volumes:
      - ~/.config:/root/.config:ro
    networks:
      - openadserver-network

# PostgreSQL Database (CDC Enabled)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: oas
      POSTGRES_PASSWORD: oas_password
      POSTGRES_DB: oas
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 建议新建一个 init-cdc.sql 放到这个目录下，用于自动配置复制权限
      - ./scripts/init-cdc.sql:/docker-entrypoint-initdb.d/init-cdc.sql:ro
    ports:
      - "5432:5432"
    # 核心改动：通过 command 启动参数开启逻辑流复制
    command: [
      "postgres",
      "-c", "wal_level=logical",           # 必须：开启逻辑日志
      "-c", "max_replication_slots=5",    # 必须：允许 Datastream 占用槽位
      "-c", "max_wal_senders=5",         # 必须：允许发送流数据
      "-c", "max_connections=100"         # 确保连接数充足
    ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oas -d oas"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - openadserver-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - openadserver-network

  # Milvus Dependencies
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - openadserver-network

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - openadserver-network

  milvus:
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - openadserver-network

volumes:
  postgres_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:

networks:
  openadserver-network:
    driver: bridge
