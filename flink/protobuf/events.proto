syntax = "proto3";

package events;

// =============================================================================
// Enumerations
// =============================================================================

enum SlotType {
    SLOT_TYPE_UNKNOWN = 0;
    SLOT_TYPE_BANNER = 1;
    SLOT_TYPE_NATIVE = 2;
    SLOT_TYPE_VIDEO = 3;
    SLOT_TYPE_INTERSTITIAL = 4;
}

enum CreativeType {
    CREATIVE_TYPE_UNKNOWN = 0;
    CREATIVE_TYPE_BANNER = 1;
    CREATIVE_TYPE_NATIVE = 2;
    CREATIVE_TYPE_VIDEO = 3;
    CREATIVE_TYPE_INTERSTITIAL = 4;
    CREATIVE_TYPE_GEO_SNIPPET = 5;
}

enum BidType {
    BID_TYPE_UNKNOWN = 0;
    BID_TYPE_CPM = 1;
    BID_TYPE_CPC = 2;
    BID_TYPE_CPA = 3;
    BID_TYPE_OCPM = 4;
    BID_TYPE_GEO = 5;
}

enum VideoEventType {
    VIDEO_EVENT_TYPE_UNKNOWN = 0;
    VIDEO_EVENT_TYPE_START = 1;
    VIDEO_EVENT_TYPE_FIRST_QUARTILE = 2;
    VIDEO_EVENT_TYPE_MIDPOINT = 3;
    VIDEO_EVENT_TYPE_THIRD_QUARTILE = 4;
    VIDEO_EVENT_TYPE_COMPLETE = 5;
}

// =============================================================================
// Message Types
// =============================================================================

// User identity with multiple ID types
message UserIdentity {
    string user_id = 1;
    string hashed_email = 2;
    string hashed_phone = 3;
    string device_id = 4;
    string cookiesync_id = 5;
    map<string, string> extended_ids = 6;
}

// Request event - records ad request context
message RequestEvent {
    string request_id = 1;
    int64 event_time = 2;
    UserIdentity user_ids = 3;
    repeated string segments = 4;
    string slot_id = 5;
    SlotType slot_type = 6;
    string ip = 7;
    string country = 8;
    string city = 9;
    string device = 10;
    string browser = 11;
    string os = 12;
    string referer = 13;
    string page_context = 14;
    int32 response_count = 15;
    bool has_winner = 16;
    double winning_bid = 17;
}

// Ad event - records details of each returned ad
message AdEvent {
    string request_id = 1;
    int32 impression_id = 2;
    string click_id = 3;
    int32 campaign_id = 4;
    int32 creative_id = 5;
    int32 advertiser_id = 6;
    double bid = 7;
    double ecpm = 8;
    double cost = 9;
    BidType bid_type = 10;
    CreativeType creative_type = 11;
    int32 banner_width = 12;
    int32 banner_height = 13;
    int32 video_duration = 14;
    string slot_id = 15;
    double pctr = 16;
    double pcvr = 17;
    string landing_url = 18;
}

// Impression event - records ad impression callback
message ImpressionEvent {
    string click_id = 1;
    int64 event_time = 2;
}

// Click event - records ad click callback
message ClickEvent {
    string click_id = 1;
    int64 event_time = 2;
}

// Conversion event - records conversion callback
message ConversionEvent {
    string click_id = 1;
    int64 event_time = 2;
    double conversion_value = 3;
    string conversion_type = 4;
    map<string, string> attributes = 5;
}

// Video VTR event - records video playback progress
message VideoVTREvent {
    string click_id = 1;
    int64 event_time = 2;
    VideoEventType event_type = 3;
    int32 progress_percent = 4;
}
